<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roster API</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid #222;
      border-radius: 12px;
      background: #141414;
    }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    h1 span { color: #6366f1; }
    p { margin-top: 0.75rem; color: #888; font-size: 0.95rem; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      background: #1a1a2e;
      border: 1px solid #6366f1;
      color: #6366f1;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .graphql-link {
      display: inline-block;
      margin-top: 1.5rem;
      margin-left: 0.5rem;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      background: #1a2e1a;
      border: 1px solid #4ade80;
      color: #4ade80;
      font-size: 0.8rem;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>roster<span>.</span>api</h1>
    <p>Controle de presença escolar</p>
    <span class="badge">{{ENV}}</span>
    {{GRAPHQL_LINK}}
  </div>
</body>
</html>
